<!DOCTYPE html>
<head><title>student Registartion page 123</title>
<script>
function show()
{
var name=document.getElementById("name").value;
var age=document.getElementById("age").value;
var email=document.getElementById("email").value;
if(name&&age&&email)
{
    document.getElementById("one").innerText="registration succ";
    document.getElementById("two").innerText="Name:"+name+"\n"+"Age:"+age+"\n"+"email"+email;
}
else
{
    document.getElementById("one").innerText="registration not succ";
}
}
</script>
</head>
<body>
<h2>Student Registartion Form</h2>
<form>
<table border="2">
<tr><td><label>Student Name</label></td><td><input type="text" id="name" size="30"></td></tr>
<tr><td><label>Student Age</label></td><td> <input type="text" id="age" size="30"></td></tr>
<tr><td><label>email</label></td><td><input type="text" id="email" size="30"></td></tr>
<tr><td><input type="button" value="submit" onclick="show()"> </td><td><input type="reset" value="reset"></td></tr>
</table>      
</form>
<p id="one"></p>
<p id="two"></p>
</body>
</html>
